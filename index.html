<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>四二班点名器</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; margin: 0; background-color: #f7f9fc;
            /* 防止iOS长按弹出菜单 */
            -webkit-touch-callout: none;
            -webkit-user-select: none;
        }
        .container { 
            text-align: center; background: white; padding: 30px; border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 85%; max-width: 400px; 
        }
        h1 { color: #333; font-size: 22px; margin-bottom: 15px; }
        #name-display { 
            font-size: 40px; font-weight: bold; color: #2c3e50; 
            height: 100px; line-height: 100px; margin: 20px 0; 
            border: 2px solid #e1e8ed; border-radius: 15px;
        }
        #status { color: #999; margin-bottom: 20px; font-size: 14px; }
        button { 
            padding: 15px 0; width: 100%; font-size: 20px; cursor: pointer; 
            background-color: #3498db; color: white; border: none; border-radius: 12px; 
            transition: background 0.2s;
            /* 防止iOS点击时的灰色背景高亮 */
            -webkit-tap-highlight-color: transparent;
        }
        button:active { background-color: #2980b9; transform: scale(0.98); }
        button:disabled { background-color: #bdc3c7; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎯 随机点名</h1>
    <div id="status">剩余人数：33</div>
    <div id="name-display">准备就绪</div>
    <button id="start-btn" onclick="toggle()">开始抽选</button>
</div>

<script>
    let students = [
        "01 李善果", "02 王忆菲", "03 任艺泞", "04 刘奕萱", "05 刘宸睿",
        "06 白蕊菡", "07 王晨皓", "08 王若汐", "09 白沁心", "10 王心妍",
        "11 杨毅", "12 刘雨茜", "13 王子越", "14 王浩鑫", "15 刘峻宇",
        "16 王鑫诺", "17 陈雨晴", "18 刘艺菲", "19 刘奕承", "20 任欣冉",
        "21 王家硕", "22 陈思桐", "23 王壹贺", "24 张硕", "25 李硕",
        "26 白梓涵", "27 李睿凡", "28 段智硕", "29 庞若伊", "30 李嘉铭",
        "31 陈浩斌", "32 刘佳阅", "33 段玉轩"
    ];

    let timer = null;
    let isRunning = false;
    const display = document.getElementById('name-display');
    const btn = document.getElementById('start-btn');
    const status = document.getElementById('status');

    function toggle() {
        if (isRunning) {
            clearInterval(timer);
            isRunning = false;
            btn.innerText = '开始抽选';
            const selectedName = display.innerText;
            const index = students.indexOf(selectedName);
            if (index > -1) students.splice(index, 1);
            status.innerText = "剩余人数：" + students.length;
            display.style.color = '#e74c3c';
            if (students.length === 0) {
                btn.disabled = true;
                btn.innerText = "全员已点";
                display.innerText = "点名结束！";
            }
        } else {
            if (students.length === 0) return;
            isRunning = true;
            btn.innerText = '停止';
            display.style.color = '#2c3e50';
            timer = setInterval(() => {
                display.innerText = students[Math.floor(Math.random() * students.length)];
            }, 50);
        }
    }
</script>

</body>
</html>
